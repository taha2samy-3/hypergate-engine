version: '3'

tasks:

  default:
    cmds:
      - task: check-prereqs
      - task: test-all
    silent: true

  check-prereqs:
    cmds:
      - docker --version || (echo "Docker not found" && exit 1)
      - docker compose version || (echo "Docker Compose not found" && exit 1)
      - pipenv --version || (echo "Pipenv not found" && exit 1)
      - pipenv run pytest --version || (echo "pytest is not installed inside pipenv" && exit 1)
    silent: true

  run-scenario:
    desc: "Run a single integration test scenario. Usage: task run-scenario NAME=<scenario_name>"
    requires:
      vars: [NAME]
    cmds:
      # Copy scenario config to root tests/config.yaml
      - cp tests/{{.NAME}}/config.yaml tests/config.yaml
      # Start docker-compose stack
      - docker compose -f tests/docker-compose.yaml --project-directory tests up -d --build
      # Wait for hyper-engine to be healthy
      - |
        echo "Waiting for hyper-engine on port 9001..."
        until nc -z 127.0.0.1 9001; do sleep 1; done
      # Wait for envoy-proxy to be healthy
      - |
        echo "Waiting for envoy-proxy on port 8080..."
        until nc -z 127.0.0.1 8080; do sleep 1; done
      # Execute pytest
      - pipenv run pytest tests/{{.NAME}}/test_{{.NAME}}.py -v || echo "error============="
      # Teardown after tests complete (runs even if tests fail)
      - task: teardown

  teardown:
    internal: true
    cmds:
      - docker compose -f tests/docker-compose.yaml --project-directory tests down -v --remove-orphans
      - rm -f tests/config.yaml
    ignore_error: true

  test-all:
    desc: "Sequentially run all integration test scenarios"
    cmds:
      - task: run-scenario
        vars: { NAME: "matching" }
        ignore_error: true
      - task: tests:test-ratelimit
        ignore_error: true
      - task: run-scenario
        vars: { NAME: "modification" }
        ignore_error: true
      - task: run-scenario
        vars: { NAME: "integrations" }
        ignore_error: true
      - task: tests:metadata-enrichment
        ignore_error: true

  tests:test-matching:
    desc: "Run matching/boolean logic tests specifically"
    cmds:
      - task: run-scenario
        vars: { NAME: "matching" }
  tests:test-ratelimit:
    desc: "Run rate limiting tests"
    cmds:
      - task: run-scenario
        vars: { NAME: "rate_limit" }
  tests:modification-filter:
    desc: "Run modification filter tests"
    cmds:
      - task: run-scenario
        vars: { NAME: "modification" }
  tests:integrations:
    desc: "Run integration tests"
    cmds:
      - task: run-scenario
        vars: { NAME: "integrations" }
  tests:metadata-enrichment:
    desc: "Run metadata enrichment tests"
    cmds:
      - task: run-scenario
        vars: { NAME: "metadata_enrichment" }

  go:tidy:
    desc: "Tidy and verify Go module dependencies"
    cmds:
      - go mod tidy
      - go mod verify
    silent: true

  go:fmt:
    desc: "Format all Go source files according to style guidelines"
    cmds:
      - go fmt ./...
    silent: true

  go:vet:
    desc: "Run Go static analysis compiler checks (vet)"
    cmds:
      - go vet ./...

  go:generate:
    desc: "Generate Protobuf and gRPC files using Buf tool"
    cmds:
      - buf generate buf.build/envoyproxy/envoy --path envoy/service/auth/v3

  go:build:
    desc: "Build highly-optimized, stripped Go binary for Linux"
    cmds:
      - mkdir -p bin
      - CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/engine ./cmd/engine

  go:clean:
    desc: "Clean up built binaries and cached test results"
    cmds:
      - rm -rf bin/
      - go clean -testcache




  operator:build:
    desc: "Build the Docker image for hyper-operator"
    cmds:
      - docker build -t taha/myprog-operator:latest -f hyper-operator/Dockerfile .
    silent: true

  operator:deploy:
    desc: "Deploy the Operator resources, ServiceAccount, Roles, and controllers"
    cmds:
      # 1. Apply Namespace, RBAC, and Deployment
      - kubectl apply -f hyper-operator/deploy/namespace.yaml
      - kubectl apply -f hyper-operator/deploy/rbac.yaml
      - kubectl apply -f hyper-operator/deploy/CRDs/hyperconfig_crd.yaml
      - kubectl apply -f hyper-operator/deploy/CRDs/hyperpolicy_crd.yaml
      - kubectl apply -f hyper-operator/deploy/CRDs/hyperroute_crd.yaml
      - kubectl apply -f hyper-operator/deploy/CRDs/hyperredis_crd.yaml
      - chmod +x hyper-operator/deploy/generate-certs.sh && ./hyper-operator/deploy/generate-certs.sh
      - kubectl apply -f hyper-operator/deploy/deployment.yaml
      - echo "Checking operator deployment status..."
      - kubectl rollout status deployment/hyper-operator -n hyper-system --timeout=60s
    silent: true

  operator:undeploy:
    desc: "Remove the Operator and all its system resources from the cluster"
    cmds:
      - kubectl delete -f hyper-operator/deploy/ --ignore-not-found
      # Cleanup any remaining dynamic ConfigMaps/DaemonSets
      - kubectl delete daemonset/hyper-engine -n hyper-system --ignore-not-found
      - kubectl delete service/hyper-engine-svc -n hyper-system --ignore-not-found
      - kubectl delete configmap/hyper-engine-config -n hyper-system --ignore-not-found
      - echo "Operator and associated resources successfully uninstalled"
    ignore_error: true
    silent: true

  operator:logs:
    desc: "Stream live logs from the running hyper-operator pod"
    cmds:
      - kubectl logs -f -n hyper-system -l control-plane=controller-manager --tail=100
    silent: true

  operator:restart:
    desc: "Rollout restart the hyper-operator deployment"
    cmds:
      - kubectl rollout restart deployment/hyper-operator -n hyper-system
    silent: true

  operator:status:
    desc: "Check the status of all resources in the hyper-system namespace"
    cmds:
      - kubectl get all -n hyper-system
    silent: true

  mock:build:
      desc: "Build the Python gRPC Mock Server container"
      cmds:
        - docker build -t taha/hyper-mock-engine:latest -f mock_engine/Dockerfile.mock mock_engine/
      silent: true


  k8s:kind:create:
    desc: "Create a Kind Kubernetes cluster with 4 nodes"
    cmds:
      - kind create cluster --config k8s/kind/kind-config.yaml
  k8s:kind:delete:
    desc: "Delete the Kind Kubernetes cluster"
    cmds:
      - kind delete cluster
  k8s:kind:reload:
    desc: "Delete and recreate the Kind Kubernetes cluster"
    cmds:
      - task: k8s:kind:delete
      - task: k8s:kind:create
  k8s:gateway:deploy:
    desc: "Install the official Kubernetes Gateway API CRDs"
    cmds:
      - kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml
  k8s:cilium:install:
    desc: "Install Cilium as the CNI plugin"
    cmds:
      - cilium install 
          --version v1.20.0-pre.3
          --set k8sServiceHost=kind-control-plane 
          --set k8sServicePort=6443 
          --set kubeProxyReplacement=true 
          --set gatewayAPI.enabled=true 
          --set hostServices.enabled=true 
          --set externalIPs.enabled=true
          --set l2announcements.enabled=true
          --set devices=eth0 
      - cilium status --wait
  k8s:cilium:l2policy:
    desc: "Enable L2 policy mode in Cilium"
    cmds:
      - kubectl apply -f k8s/cilium/l2policy.yaml
  k8s:cilium:pool:
    desc: "Enable L2 policy mode in Cilium"
    cmds:
      - kubectl apply -f k8s/cilium/pool.yaml