name: 'Setup Go Environment'
description: 'Installs Go and configures high-performance build and module caching'
inputs:
  go-version:
    description: 'Go version to install'
    required: false
    default: '1.26.4'

runs:
  using: 'composite'
  steps:
    - name: Install Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Verify Go Installation
      shell: bash
      run: |
        go version
