name: Deploy to Test/Staging

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [engine, operator]

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Push and Attest Image
        uses: ./.github/actions/build-push-image
        with:
          target: ${{ matrix.target }}
          image_tag: sha-${{ github.sha }}
          registry: ghcr.io/taha2samy-3

      - name: Update GitOps Manifests
        if: matrix.target == 'operator'
        shell: bash
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions-bot@users.noreply.github.com"
          sed -i 's|image: ghcr.io/taha2samy-3/hyper-operator:.*|image: ghcr.io/taha2samy-3/hyper-operator:sha-'${{ github.sha }}'|g' hyper-operator/deploy/deployment.yaml
          git add hyper-operator/deploy/deployment.yaml
          git diff-index --quiet HEAD || git commit -m "chore(deploy): update operator image to sha-${{ github.sha }} [skip ci]"
          git push origin main
