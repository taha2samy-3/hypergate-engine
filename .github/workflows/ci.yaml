name: CI Build & Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: hyper-engine
            context: .
            file: ./Dockerfile
            tag: "1.0.0"
          - name: hyper-operator
            context: .
            file: ./hyper-operator/Dockerfile
            tag: "1.0.0"
          - name: hyper-mock-engine
            context: ./mock_engine
            file: ./mock_engine/Dockerfile.mock
            tag: "1.0.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Downcase Owner Name
        run: |
          echo "OWNER_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER_LOWER }}/${{ matrix.name }}:${{ matrix.tag }}

  cleanup:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          packages: 'hyper-engine,hyper-operator,hyper-mock-engine'
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true