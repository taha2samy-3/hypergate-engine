name: CI Build & Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  hyperengine_tag: "1.0.0"
  operator_tag: "1.0.0"
  mock_engine_tag: "1.0.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hyper-engine:${{ env.hyperengine_tag }}

      - name: Build & Push Operator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./hyper-operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hyper-operator:${{ env.operator_tag }}

      - name: Build & Push Mock Engine
        uses: docker/build-push-action@v5
        with:
          context: ./mock_engine
          file: ./mock_engine/Dockerfile.mock
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hyper-mock-engine:${{ env.mock_engine_tag }}

  cleanup:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          packages: 'hyper-engine,hyper-operator,hyper-mock-engine'
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true