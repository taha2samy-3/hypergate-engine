name: PR Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  pr-title-check:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code_changed:
              - '**/*.go'
              - '**/*.py'
              - 'go.mod'
              - 'go.sum'
              - 'Pipenv'
              - 'Pipfile'
              - 'Pipfile.lock'
              - 'Dockerfile'
              - 'hyper-operator/Dockerfile'

  lint-and-security:
    name: Lint & Security Scan
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Leaked Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: Set up Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Run Go Linters
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Security Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  codeql-analysis:
    name: CodeQL Static Analysis
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-dry-run:
    name: Verify Multi-Platform Build (${{ matrix.target }})
    needs: lint-and-security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [engine, operator]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Dry-Run Build with Docker Bake
        uses: docker/bake-action@v3
        with:
          targets: ${{ matrix.target }}
          push: false
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
