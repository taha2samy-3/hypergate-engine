name: Production Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release-prod:
    name: Build & Release (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [engine, operator]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Push and Attest Production Image
        uses: ./.github/actions/build-push-image
        with:
          target: ${{ matrix.target }}
          image_tag: ${{ github.ref_name }}
          registry: ghcr.io/taha2samy-2

      - name: Create GitHub Release
        if: matrix.target == 'engine'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Update Prod GitOps Manifests
        if: matrix.target == 'operator'
        shell: bash
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions-bot@users.noreply.github.com"
          sed -i 's|image: ghcr.io/taha2samy-2/hyper-operator:.*|image: ghcr.io/taha2samy-2/hyper-operator:'${{ github.ref_name }}'|g' hyper-operator/deploy/deployment.yaml
          git add hyper-operator/deploy/deployment.yaml
          git diff-index --quiet HEAD || git commit -m "chore(release): deploy release ${{ github.ref_name }} [skip ci]"
          git push origin main
