apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-operator
  namespace: hyper-system
  labels:
    control-plane: controller-manager
spec:
  replicas: 1 
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: hyper-operator-sa
      containers:
        - name: manager
          image: ghcr.io/taha2samy-3/hyper-operator:0.1.0-alpha.1
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          env:
            - name: ENABLE_WEBHOOKS
              value: "true" # Webhooks enabled
          ports:
            - containerPort: 9443 # Default port for the webhook server
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: webhook-server-cert
      terminationGracePeriodSeconds: 10