apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-operator
  namespace: hyper-system
  labels:
    control-plane: controller-manager
spec:
  replicas: 1 # Leader election is enabled, 1 is perfect, can be 2 for HA
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: hyper-operator-sa
      containers:
        - name: manager
          image: ghcr.io/taha2samy-2/hyper-operator:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          env:
            - name: ENABLE_WEBHOOKS
              value: "false" # Set to "true" to enable validating webhooks
          # volumeMounts:
          #   - mountPath: /tmp/k8s-webhook-server/serving-certs
          #     name: cert
          #     readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      # volumes:
      #   - name: cert
      #     secret:
      #       defaultMode: 420
      #       secretName: webhook-server-cert
      terminationGracePeriodSeconds: 10