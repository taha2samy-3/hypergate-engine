apiVersion: v1
kind: ServiceAccount
metadata:
  name: hyper-operator-sa
  namespace: hyper-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hyper-operator-role
rules:
  - apiGroups: ["hyper.io"]
    resources: ["hyperconfigs", "hyperredis", "hyperroutes", "hyperchains", "ratelimitfilters", "headermodifierfilters", "denyfilters", "correlationidfilters", "redismetadataenricherfilters", "apikeyfilters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyper.io"]
    resources: ["hyperconfigs/status", "hyperredis/status", "hyperroutes/status", "hyperchains/status", "ratelimitfilters/status", "headermodifierfilters/status", "denyfilters/status", "correlationidfilters/status", "redismetadataenricherfilters/status", "apikeyfilters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps", "services", "serviceaccounts", "namespaces", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hyper-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hyper-operator-role
subjects:
  - kind: ServiceAccount
    name: hyper-operator-sa
    namespace: hyper-system