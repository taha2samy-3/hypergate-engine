apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hyperchains.hyper.io
spec:
  group: hyper.io
  names:
    kind: HyperChain
    listKind: HyperChainList
    plural: hyperchains
    singular: hyperchain
    shortNames:
    - hc
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - filters
            properties:
              filters:
                type: array
                items:
                  type: object
                  required:
                  - kind
                  - name
                  properties:
                    kind:
                      type: string
                      enum:
                      - RateLimitFilter
                      - HeaderModifierFilter
                      - DenyFilter
                      - CorrelationIdFilter
                      - RedisMetadataEnricherFilter
                    name:
                      type: string
          status:
            type: object
            properties:
              state:
                type: string
              message:
                type: string
