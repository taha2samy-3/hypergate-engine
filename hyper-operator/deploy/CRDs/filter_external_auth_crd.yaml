apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalauthfilters.hyper.io
spec:
  group: hyper.io
  names:
    kind: ExternalAuthFilter
    listKind: ExternalAuthFilterList
    plural: externalauthfilters
    singular: externalauthfilter
    shortNames:
    - eaf
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Protocol
      type: string
      jsonPath: .spec.protocol
    - name: Image
      type: string
      jsonPath: .spec.container.image
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - container
            properties:
              protocol:
                type: string
                default: "http"
                enum: [http, grpc]
              container:
                type: object
                required:
                - image
                properties:
                  image:
                    type: string
                  imagePullPolicy:
                    type: string
                    enum: [Always, Never, IfNotPresent]
                  imagePullSecrets:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                  args:
                    type: array
                    items:
                      type: string
                  env:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            fieldRef:
                              type: object
                              properties:
                                apiVersion:
                                  type: string
                                fieldPath:
                                  type: string
                            resourceFieldRef:
                              type: object
                              properties:
                                containerName:
                                  type: string
                                resource:
                                  type: string
                                divisor:
                                  type: string
                            configMapKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                            secretKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                  envFrom:
                    type: array
                    items:
                      type: object
                      properties:
                        prefix:
                          type: string
                        configMapRef:
                          type: object
                          properties:
                            name:
                              type: string
                            optional:
                              type: boolean
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            optional:
                              type: boolean
                  resources:
                    type: object
                    properties:
                      requests:
                        type: object
                        additionalProperties:
                          type: string
                      limits:
                        type: object
                        additionalProperties:
                          type: string
              engineRules:
                type: object
                properties:
                  timeout:
                    type: string
                    default: "2s"
                  forwardHeaders:
                    type: array
                    items:
                      type: string
                  onSuccess:
                    type: object
                    properties:
                      upstreamHeadersToAdd:
                        type: array
                        items:
                          type: string
                      upstreamHeadersToRemove:
                        type: array
                        items:
                          type: string
                  onFailure:
                    type: object
                    properties:
                      downstreamPassThroughHeaders:
                        type: array
                        items:
                          type: string
          status:
            type: object
