apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hyperconfigs.hyper.io
spec:
  group: hyper.io
  names:
    kind: HyperConfig
    listKind: HyperConfigList
    plural: hyperconfigs
    singular: hyperconfig
    shortNames:
      - hcfg 
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - redisServiceRef
              properties:
                serverAddress:
                  type: string
                  default: "0.0.0.0:9001"
                maxConcurrentStreams:
                  type: integer
                logLevel:
                  type: string
                  enum:
                    - DEBUG
                    - INFO
                    - WARN
                    - ERROR
                  default: "INFO"
                targetNamespace:
                  type: string
                  default: "hyper-system"
                engineImage:
                  type: string
                  default: "ghcr.io/taha2samy-2/hyper-engine:1.0.0"
                redisServiceRef:
                  type: string
                defaultChain:
                  type: string
            status:
              type: object