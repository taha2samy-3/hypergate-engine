version: "v1"

server:
  address: "0.0.0.0:9001"
  max_concurrent_streams: 1024

telemetry:
  logging:
    level: "DEBUG"
    format: "console"
    output_path: "stdout"
    development: false

redis:
  myredis:
    url: "redis:6379"
    type: "SINGLE"
    timeout: "100ms"
    wait_timeout: "100ms"

chains:

  chain_domino_effect:
    - type: "header_modifier"
      options:
        upstream:
          add:
            "X-Cost": "10" # Inject a dynamic cost value of 10 units upstream.
            
    - type: "embedded_rate_limiter"
      options:
        domain: "test_domino"
        algorithm: "fixed_window"
        redis_service: "myredis"
        response_headers:
          enabled: true
        dynamic_cost:
          enabled: true
          source_header: "X-Cost" # Read the mutable cost header injected by Step 1.
          default_fallback_cost: 1
          max_allowed_cost: 50
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 20
            unit: "minute"

  chain_integrated:
    - type: "correlation_id"
      options:
        algorithm: "uuidv4"
        header_name: "x-request-id"
        propagate_to_downstream: true
        propagate_to_upstream: true
    - type: "header_modifier"
      options:
        upstream:
          add:
            "x-test-upstream": "processed"
        downstream:
          add:
            "x-test-downstream": "modified"
    - type: "embedded_rate_limiter"
      options:
        domain: "test_token"
        algorithm: "token_bucket"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        dynamic_cost:
          enabled: true
          source_header: "X-Cost"
          default_fallback_cost: 1
          max_allowed_cost: 100
        descriptors:
          - entries:
              - key: "client_ip"
            max_tokens: 10
            fill_rate: 1

  chain_fixed_limit:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_fixed_limit"
        algorithm: "fixed_window"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 5
            unit: "second"
            fail_open: false

  chain_fail_open:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_fail_open"
        algorithm: "fixed_window"
        redis_service: "myredis"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 5
            unit: "second"
            fail_open: true

  chain_sliding_counter:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_sliding"
        algorithm: "sliding_window_counter"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 10
            unit: "minute"

  chain_leaky:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_leaky"
        algorithm: "leaky_bucket"
        redis_service: "myredis"
        descriptors:
          - entries:
              - key: "client_ip"
            bucket_capacity: 10
            leak_rate: 1
            unit: "second"

  chain_fixed:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_fixed_20"
        algorithm: "fixed_window"
        redis_service: "myredis"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 20
            unit: "minute"

  chain_sliding:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_sliding_20"
        algorithm: "sliding_window_counter"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 20
            unit: "minute"

  chain_sliding_log:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_sliding_log"
        algorithm: "sliding_window_log"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 5
            unit: "second"

  # Policy to test 'Shadow Mode' functionality in rate limiting.
  # Requests exceeding the limit will still pass (200 OK) but
  # rate limit headers will reflect that the limit has been hit.
  chain_shadow_mode_test:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_shadow"
        algorithm: "fixed_window"
        redis_service: "myredis"
        response_headers:
          enabled: true # Crucial for observing remaining limits.
        descriptors:
          - entries:
              - key: "client_ip"
            limit: 5          # A small limit to easily trigger overage.
            unit: "second"
            shadow_mode: true # This is the key: enable shadow mode!

  chain_malicious_cost_test:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_malicious_cost"
        algorithm: "token_bucket"
        redis_service: "myredis"
        response_headers:
          enabled: true
        dynamic_cost:
          enabled: true
          source_header: "X-Cost"
          default_fallback_cost: 1 # Safe default if string is malformed or invalid.
          max_allowed_cost: 5       # Hard ceiling to prevent out-of-bound depletion.
        descriptors:
          - entries:
              - key: "client_ip"
            max_tokens: 10
            fill_rate: 1

  chain_composite_roles:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_composite"
        algorithm: "fixed_window"
        redis_service: "myredis"
        response_headers:
          enabled: true
        header_mappings:
          "role": "X-User-Role"
          "cycle": "X-Billing-Cycle"
        descriptors:
          # 1. Specific Rule: Manager (30 requests per minute)
          - entries:
              - key: "role"
                value: "manager"
              - key: "cycle"
            limit: 30
            unit: "minute"

          # 2. Specific Rule: Client (10 requests per minute)
          - entries:
              - key: "role"
                value: "client"
              - key: "cycle"
            limit: 10
            unit: "minute"

          # 3. Fallback (OTHER) Rule: Any other role/cycle combination (5 requests per minute)
          - entries:
              - key: "role"
              - key: "cycle"
            limit: 5
            unit: "minute"

  chain_composite_sliding:
    - type: "embedded_rate_limiter"
      options:
        domain: "test_composite_sliding"
        algorithm: "sliding_window_counter"
        redis_service: "myredis"
        response_headers:
          enabled: true
          limit_header: "RateLimit-Limit"
          remaining_header: "RateLimit-Remaining"
          reset_header: "RateLimit-Reset"
        header_mappings:
          "role": "X-User-Role"
          "cycle": "X-Billing-Cycle"
        descriptors:
          # 1. Specific Rule: Manager (20 requests per minute)
          - entries:
              - key: "role"
                value: "manager"
              - key: "cycle"
            limit: 20
            unit: "minute"

          # 2. Specific Rule: Client (5 requests per minute)
          - entries:
              - key: "role"
                value: "client"
              - key: "cycle"
            limit: 5
            unit: "minute"

          # 3. Fallback (OTHER) Rule: Any other combination (2 requests per minute)
          - entries:
              - key: "role"
              - key: "cycle"
            limit: 2
            unit: "minute"

router:
  routes:
    - target_chain: "chain_fixed"
      matches:
        - path_prefix: "/fixed"
    - target_chain: "chain_composite_sliding"
      matches:
        - path_prefix: "/composite_sliding"
    - target_chain: "chain_sliding_log"
      matches:
        - path_prefix: "/sliding_log"
    - target_chain: "chain_integrated"
      matches:
        - path_prefix: "/token"
    - target_chain: "chain_leaky"
      matches:
        - path_prefix: "/leaky"
    - target_chain: "chain_fail_open"
      matches:
        - path_prefix: "/fail_open"
    - target_chain: "chain_fixed_limit"
      matches:
        - path_prefix: "/fail_closed"
    - target_chain: "chain_sliding"
      matches:
        - path_prefix: "/sliding"
    - target_chain: "chain_domino_effect"
      matches:
        - path_prefix: "/domino"
    - target_chain: "chain_shadow_mode_test"
      matches:
        - path_prefix: "/shadow"
    - target_chain: "chain_malicious_cost_test"
      matches:
        - path_prefix: "/malicious_cost"
    - target_chain: "chain_composite_roles"
      matches:
        - path_prefix: "/composite"
  other: "chain_fixed_limit"